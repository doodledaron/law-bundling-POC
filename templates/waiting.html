<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Document - Please Wait</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .loading-container {
            text-align: center;
            padding: 50px 0;
        }
        
        .progress {
            height: 25px;
            margin: 30px auto;
            max-width: 600px;
        }
        
        .animated-progress {
            width: 100%;
            animation: progress-animation 2s infinite;
        }
        
        @keyframes progress-animation {
            0% { width: 10%; }
            50% { width: 90%; }
            100% { width: 10%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12 loading-container">
                <h1 class="mb-4">Processing Your Document</h1>
                <p class="lead">Your file is being analyzed. This may take a few moments...</p>
                
                <div class="progress">
                    <div class="progress-bar progress-bar-striped progress-bar-animated animated-progress" role="progressbar"></div>
                </div>
                
                <p id="status-message">Extracting text and analyzing content...</p>
                <p id="wait-time" class="text-muted">Estimated waiting time: <span id="time-remaining">30-60</span> seconds</p>
            </div>
        </div>
    </div>

    <script>
        // Task ID from template
        const taskId = "{{ task_id }}";
        
        // Check the task status every 3 seconds
        function checkTaskStatus() {
            fetch(`/task-status/${taskId}`)
                .then(response => response.json())
                .then(data => {
                    console.log("Task status:", data);
                    
                    if (data.status === "SUCCESS") {
                        // Task completed, redirect to the results
                        window.location.href = `/results/${taskId}`;
                    } else if (data.status === "FAILURE") {
                        // Task failed, show error message
                        document.getElementById("status-message").innerHTML = 
                            "An error occurred while processing your document. Please try again.";
                        document.getElementById("status-message").classList.add("text-danger");
                        document.getElementById("wait-time").style.display = "none";
                    } else {
                        // Task still in progress, update the message based on status
                        if (data.status === "PENDING") {
                            document.getElementById("status-message").innerHTML = 
                                "Your document is in the queue and will be processed shortly...";
                        } else if (data.status === "STARTED") {
                            document.getElementById("status-message").innerHTML = 
                                "Processing your document: extracting text and analyzing content...";
                        }
                        
                        // Check again in 3 seconds
                        setTimeout(checkTaskStatus, 3000);
                    }
                })
                .catch(error => {
                    console.error("Error checking task status:", error);
                    // Check again in 5 seconds in case of network error
                    setTimeout(checkTaskStatus, 5000);
                });
        }
        
        // Start checking task status when page loads
        document.addEventListener("DOMContentLoaded", function() {
            // Initial check after 2 seconds to give the task time to start
            setTimeout(checkTaskStatus, 2000);
            
            // Update the countdown timer
            let timeRemaining = 45; // Start with 45 seconds
            const timerElement = document.getElementById("time-remaining");
            
            const timer = setInterval(() => {
                timeRemaining -= 1;
                if (timeRemaining <= 0) {
                    clearInterval(timer);
                    timerElement.innerHTML = "finalizing...";
                } else {
                    timerElement.innerHTML = `${timeRemaining}`;
                }
            }, 1000);
        });
    </script>
</body>
</html>
